name: Community daily seed

on:
  schedule:
    # Hourly during ICT 07:00–23:00 (ICT = UTC+7 → UTC 00:00–16:00).
    # The script also gates active hours internally; this just limits runs.
    - cron: '0 0-16 * * *'
  workflow_dispatch:
    inputs:
      force:
        description: 'Force a post this run (ignore active-hour gate)'
        type: boolean
        default: false
      dry:
        description: 'Dry run (generate, insert nothing)'
        type: boolean
        default: false

concurrency:
  group: community-seed
  cancel-in-progress: false

jobs:
  seed:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Run tick
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          node scripts/community-daily.js --tick \
            ${{ github.event.inputs.force == 'true' && '--force' || '' }} \
            ${{ github.event.inputs.dry == 'true' && '--dry' || '' }}

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FYI — Result v3</title>
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:ital,wght@0,400;0,600;0,700;0,800;0,900;1,700;1,800;1,900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Be Vietnam Pro',sans-serif;background:#111;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:60px 20px;-webkit-font-smoothing:antialiased}

.sw-wrap{position:fixed;top:12px;left:50%;transform:translateX(-50%);background:#000;border:1px solid #222;border-radius:20px;padding:3px;display:flex;gap:2px;z-index:100}
.sw{padding:5px 12px;border-radius:16px;font-size:10px;font-weight:700;cursor:pointer;color:rgba(255,255,255,.3);border:none;background:0;font-family:inherit}
.sw.on{background:#fff;color:#111}

.phone{width:375px;background:#000;border-radius:44px;border:10px solid #1a1a1a;overflow:hidden;box-shadow:0 32px 80px rgba(0,0,0,.8)}
.inner{max-height:812px;overflow-y:auto;scroll-behavior:smooth}

/* ══ SCREEN 1: THE PUNCH ══ */
.s1{min-height:480px;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 28px 32px;position:relative}
.s1-eye{font-size:9px;font-weight:700;letter-spacing:.14em;color:rgba(255,255,255,.12);text-transform:uppercase;margin-bottom:52px}

.s1-vs{display:flex;align-items:flex-end;gap:28px;margin-bottom:20px}
.s1-col{text-align:center}
.s1-n{font-size:40px;font-weight:900;color:#fff;line-height:1}
.s1-l{font-size:10px;color:rgba(255,255,255,.2);margin-top:4px}
.s1-mid{font-size:18px;color:rgba(255,255,255,.08);padding-bottom:12px}

.s1-diff{font-size:88px;font-weight:900;font-style:italic;line-height:.9;margin-bottom:8px}
.s1-diff.bad{color:#ff4400;text-shadow:0 0 80px rgba(255,68,0,.4)}
.s1-diff.ok{color:#facc15;text-shadow:0 0 60px rgba(250,204,21,.25)}
.s1-diff.good{color:#4ade80;text-shadow:0 0 60px rgba(74,222,128,.25)}
.s1-sub{font-size:13px;color:rgba(255,255,255,.3)}
.s1-hint{position:absolute;bottom:16px;font-size:9px;color:rgba(255,255,255,.08);animation:p 2s ease infinite}
@keyframes p{0%,100%{opacity:.08}50%{opacity:.2}}

/* ══ SCREEN 2: THE PROOF ══ */
.s2{padding:28px 24px 40px}
.s2-title{font-size:9px;font-weight:700;letter-spacing:.12em;color:rgba(255,255,255,.12);text-transform:uppercase;margin-bottom:16px}
.s2-row{display:flex;align-items:center;justify-content:space-between;padding:13px 0;border-bottom:1px solid rgba(255,255,255,.03)}
.s2-row:last-child{border:none}
.s2-name{font-size:14px;font-weight:600;color:rgba(255,255,255,.7)}
.s2-right{text-align:right}
.s2-sal{font-size:15px;font-weight:800;color:#fff}
.s2-pct{font-size:11px;font-weight:700;color:#ff4400;margin-top:1px}
.s2-you{opacity:.35}
.s2-you .s2-name{color:#ff4400;font-weight:800}
.s2-you .s2-sal{color:#ff4400}

.s2-cta{display:block;width:100%;margin-top:20px;padding:14px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:12px;text-align:center;text-decoration:none;font-size:13px;font-weight:600;color:rgba(255,255,255,.4);transition:all .15s}
.s2-cta:hover{background:rgba(255,255,255,.08);color:rgba(255,255,255,.7);border-color:rgba(255,255,255,.15)}
</style>
</head>
<body>

<div class="sw-wrap">
  <button class="sw on" onclick="s('bad',this)">Underpaid</button>
  <button class="sw" onclick="s('ok',this)">Market rate</button>
  <button class="sw" onclick="s('good',this)">Overpaid</button>
</div>

<div class="phone"><div class="inner" id="sc">

<!-- SCREEN 1 -->
<div class="s1">
  <div class="s1-eye">Backend · 3–4 yrs · Vietnam</div>

  <div class="s1-vs">
    <div class="s1-col"><div class="s1-n" id="yn">30M</div><div class="s1-l">You</div></div>
    <div class="s1-mid">vs</div>
    <div class="s1-col"><div class="s1-n" id="mn">42M</div><div class="s1-l">Market</div></div>
  </div>

  <div class="s1-diff bad" id="dn">-12M</div>
  <div class="s1-sub" id="ds">you're losing every month</div>

  <div class="s1-hint">↓ scroll</div>
</div>

<!-- SCREEN 2 -->
<div class="s2">
  <div class="s2-title">Companies paying more for your role</div>

  <div class="s2-row"><div class="s2-name">Grab Vietnam</div><div class="s2-right"><div class="s2-sal">52M</div><div class="s2-pct">+73%</div></div></div>
  <div class="s2-row"><div class="s2-name">VNG</div><div class="s2-right"><div class="s2-sal">45M</div><div class="s2-pct">+50%</div></div></div>
  <div class="s2-row"><div class="s2-name">FPT Software</div><div class="s2-right"><div class="s2-sal">38M</div><div class="s2-pct">+27%</div></div></div>
  <div class="s2-row s2-you"><div class="s2-name">You</div><div class="s2-right"><div class="s2-sal">30M</div></div></div>

  <a href="/jobs" class="s2-cta" id="cta">See open positions at these companies →</a>
</div>

</div></div>

<script>
function s(t,el){
  document.querySelectorAll('.sw').forEach(function(b){b.classList.remove('on')});
  el.classList.add('on');
  var yn=document.getElementById('yn'),mn=document.getElementById('mn'),dn=document.getElementById('dn'),ds=document.getElementById('ds'),cta=document.getElementById('cta');
  if(t==='bad'){
    yn.textContent='30M';mn.textContent='42M';
    dn.className='s1-diff bad';dn.textContent='-12M';
    ds.textContent="you're losing every month";
    cta.textContent='See open positions at these companies →';
    cta.style.display='';
  }else if(t==='ok'){
    yn.textContent='41M';mn.textContent='42M';
    dn.className='s1-diff ok';dn.textContent='~0';
    ds.textContent="you're at market rate";
    cta.textContent='See how top earners got there →';
    cta.style.display='';
  }else{
    yn.textContent='57M';mn.textContent='42M';
    dn.className='s1-diff good';dn.textContent='+15M';
    ds.textContent="you're earning above market";
    cta.style.display='none';
  }
  document.getElementById('sc').scrollTo({top:0,behavior:'smooth'});
}
</script>
</body>
</html>
